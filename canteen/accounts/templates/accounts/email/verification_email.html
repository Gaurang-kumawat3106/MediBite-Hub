<!DOCTYPE html>
<html>
<head>
    <title>Verify your email</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px;">
    <div style="max-width: 600px; margin: auto; background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="color: #333333; text-align: center;">Welcome to Medibite, {{ user.username }}!</h2>
        <p style="color: #555555; text-align: center; font-size: 16px;">
            Please confirm your email address to activate your account.
        </p>
        <div style="text-align: center; margin: 30px 0;">
            <a href="http://{{ domain }}{% url 'verify_email' uidb64=uid token=token %}" 
               style="background-color: #0d6efd; color: #ffffff; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 16px;">
                Verify Email Address
            </a>
        </div>
        <p style="color: #999999; font-size: 14px; text-align: center;">
            If you did not create an account, please ignore this email.
        </p>
    </div>
</body>
</html>
