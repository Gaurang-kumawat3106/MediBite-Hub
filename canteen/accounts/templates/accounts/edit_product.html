{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - {{ product.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/outlet_style.css' %}">
    <style>
        .edit-container { 
            max-width: 500px; 
            margin: 4rem auto; 
            background: rgba(40, 40, 50, 0.4); 
            backdrop-filter: blur(12px); 
            border-radius: 20px; 
            padding: 3rem 2rem; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            text-align: center; 
        }
        .product-preview { 
            width: 140px; 
            height: 140px; 
            border-radius: 24px; 
            object-fit: cover; 
            margin: 0 auto 1.5rem; 
            background: rgba(255,255,255,0.05); 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            overflow:hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .product-preview img { width: 100%; height: 100%; object-fit: cover; }
        .product-preview i { font-size: 3.5rem; color: rgba(255,255,255,0.3); }
        .edit-container h2 { font-size: 2rem; margin-bottom: 0.2rem; color: #fff; font-weight: 600;}
        .cat-tag { 
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 1.5rem;
        }
        .price-display { font-size: 3rem; font-weight: 700; color: #4ade80; margin: 1rem 0; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .btn-inc { background: rgba(74, 222, 128, 0.1); margin: 0; color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); font-size: 1.1rem; cursor: pointer; padding: 1rem; border-radius: 12px; transition: 0.3s; font-weight: 500;}
        .btn-inc:hover { background: rgba(74, 222, 128, 0.2); }
        .btn-dec { background: rgba(255, 255, 255, 0.05); margin: 0; color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); font-size: 1.1rem; cursor: pointer; padding: 1rem; border-radius: 12px; transition: 0.3s; font-weight: 500;}
        .btn-dec:hover { background: rgba(255, 255, 255, 0.1); }
        
        .price-input-row { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .price-input-row input { 
            flex: 1; 
            padding: 1rem; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.3); 
            color: white; 
            font-size: 1.2rem; 
            text-align: center;
            outline: none;
            transition: 0.2s;
        }
        .price-input-row input:focus {
            border-color: #4ade80;
        }
        .price-input-row button {
            background: #4ade80;
            color: #000;
            padding: 0 1.5rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .price-input-row button:hover { background: #22c55e;}
        
        .btn-del { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 1rem; border-radius: 12px; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.3s; font-weight: 600;}
        .btn-del:hover { background: rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <nav>
        <a href="{% url 'outlet_products' %}" class="nav-back">
            <i class="fa-solid fa-arrow-left"></i> Back to Menu
        </a>
    </nav>
    <div class="container">
        <div class="edit-container">
            <div class="product-preview">
                {% if product.image %}
                    <img src="{{ product.image.url }}" alt="{{ product.name }}">
                {% else %}
                    <i class="fa-solid fa-bowl-food"></i>
                {% endif %}
            </div>
            <h2>{{ product.name }}</h2>
            <div class="cat-tag">{{ product.category.name }}</div>
            
            <div class="price-display">₹{{ product.price }}</div>
            
            <h4 style="text-align: left; color: rgba(255,255,255,0.7); margin-bottom: 0.8rem; font-weight: 500;">Quick Adjustment</h4>
            <div class="action-grid">
                <form method="post" action="{% url 'edit_product' product.id %}">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="decrease">
                    <button type="submit" class="btn-dec" style="width: 100%;"><i class="fa-solid fa-minus"></i> ₹10</button>
                </form>
                <form method="post" action="{% url 'edit_product' product.id %}">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="increase">
                    <button type="submit" class="btn-inc" style="width: 100%;"><i class="fa-solid fa-plus"></i> ₹10</button>
                </form>
            </div>
            
            <form method="post" action="{% url 'edit_product' product.id %}">
                {% csrf_token %}
                <input type="hidden" name="action" value="set_price">
                <h4 style="text-align: left; color: rgba(255,255,255,0.7); margin-bottom: 0.8rem; font-weight: 500;">Exact Price</h4>
                <div class="price-input-row">
                    <input type="number" step="0.01" min="0" name="price" value="{{ product.price }}">
                    <button type="submit">Update</button>
                </div>
            </form>
            
            <hr style="border-top: 1px solid rgba(255,255,255,0.1); border-bottom: none; border-left: none; border-right: none; margin: 2.5rem 0 1.5rem;">
            
            <form method="post" action="{% url 'edit_product' product.id %}" onsubmit="return confirm('WARNING: Are you sure you want to permanently delete \'{{ product.name }}\'? This action cannot be undone.');">
                {% csrf_token %}
                <input type="hidden" name="action" value="delete">
                <button type="submit" class="btn-del"><i class="fa-solid fa-trash-can" style="margin-right: 8px;"></i> Delete Product Permanently</button>
            </form>
        </div>
    </div>
</body>
</html>
