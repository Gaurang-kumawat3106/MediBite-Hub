{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="auth-container">
        <div class="auth-card" style="text-align: center;">
            <div class="auth-header">
                <i class="fa-solid fa-check-circle auth-logo" style="font-size: 3rem; color: #28a745;"></i>
                <h1 class="auth-title">Password Reset Complete</h1>
            </div>
            
            <p style="color: var(--text-muted); margin-bottom: 20px;">Your password has been set. You may go ahead and log in now.</p>
            
            <a href="{% url 'login' %}" class="btn btn-primary" style="display: inline-block; text-decoration: none;">Log In</a>
        </div>
    </div>
</body>
</html>
