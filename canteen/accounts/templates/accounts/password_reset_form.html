{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-lock-open auth-logo"></i>
                <h1 class="auth-title">Forgot Password</h1>
                <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 5px;">Enter your email and we'll send you a link to reset your password</p>
            </div>

            {% if messages %}
            <div class="messages-container" style="margin-bottom: 15px;">
                {% for message in messages %}
                <div class="alert-{{ message.tags }}" style="padding: 10px; border-radius: 8px; font-size: 0.95rem; margin-bottom: 10px; background-color: {% if message.tags == 'success' %}rgba(40,167,69,0.1){% else %}rgba(220,53,69,0.1){% endif %}; color: {% if message.tags == 'success' %}#28a745{% else %}#dc3545{% endif %}; border: 1px solid {% if message.tags == 'success' %}rgba(40,167,69,0.2){% else %}rgba(220,53,69,0.2){% endif %};">
                    <i class="fa-solid {% if message.tags == 'success' %}fa-check-circle{% else %}fa-circle-exclamation{% endif %}"></i>
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group" style="margin-bottom: 20px;">
                    <label class="form-label" for="email">Email Address</label>
                    <i class="fa-solid fa-envelope form-icon" style="padding-top: 23px;"></i>
                    <input type="email" name="email" id="email" class="form-control" placeholder="Enter your email address" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
            </form>
            <div class="auth-links" style="margin-top: 20px; text-align: center;">
                <a href="{% url 'login' %}">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
