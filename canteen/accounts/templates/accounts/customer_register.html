<h2>Register as Customer</h2>

{% if msg %}
<p style="color:red">{{ msg }}</p>
{% endif %}

<form method="post" action="{% url 'customer_register' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>

<p>
    Already have an account?
    <a href="{% url 'login' %}">Login</a>
</p>
